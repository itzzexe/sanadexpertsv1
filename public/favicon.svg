<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="trainingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141a0f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#23321a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e140a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="trainingAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C5A572;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#F0D4A0;stop-opacity:0.4" />
    </linearGradient>
    <radialGradient id="knowledgeGlow" cx="70%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#C5A572;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#C5A572;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#trainingGradient)"/>
  
  <!-- Knowledge glow -->
  <ellipse cx="1300" cy="300" rx="700" ry="500" fill="url(#knowledgeGlow)"/>
  
  <!-- Abstract learning elements -->
  <g opacity="0.25">
    <!-- Books/Knowledge stack -->
    <g transform="translate(1400, 400)">
      <rect x="0" y="80" width="120" height="15" rx="2" fill="#C5A572" opacity="0.7"/>
      <rect x="5" y="65" width="110" height="15" rx="2" fill="#C5A572" opacity="0.6"/>
      <rect x="10" y="50" width="100" height="15" rx="2" fill="#C5A572" opacity="0.8"/>
      <rect x="15" y="35" width="90" height="15" rx="2" fill="#C5A572" opacity="0.5"/>
      <rect x="20" y="20" width="80" height="15" rx="2" fill="#C5A572" opacity="0.7"/>
    </g>
  </g>
  
  <!-- Growth arrows -->
  <g opacity="0.3">
    <g transform="translate(300, 700)">
      <path d="M0 50 L40 10 L30 20 L60 20 L60 30 L30 30 L40 40 Z" fill="#C5A572" opacity="0.6"/>
      <path d="M80 40 L120 0 L110 10 L140 10 L140 20 L110 20 L120 30 Z" fill="#C5A572" opacity="0.7"/>
      <path d="M160 30 L200 -10 L190 0 L220 0 L220 10 L190 10 L200 20 Z" fill="#C5A572" opacity="0.8"/>
    </g>
  </g>
  
  <!-- Training icons -->
  <g transform="translate(200, 300)" opacity="0.2">
    <!-- Graduation cap -->
    <path d="M50 30 L10 40 L50 50 L90 40 L50 30 Z" stroke="#C5A572" stroke-width="2" fill="none"/>
    <path d="M50 50 L50 70" stroke="#C5A572" stroke-width="2"/>
    <path d="M45 70 L55 70" stroke="#C5A572" stroke-width="2"/>
    <circle cx="80" cy="45" r="3" fill="#C5A572"/>
    <path d="M80 45 L80 55 L85 60" stroke="#C5A572" stroke-width="1" fill="none"/>
  </g>
  
  <!-- Learning path -->
  <g opacity="0.2">
    <g transform="translate(100, 500)">
      <circle cx="0" cy="0" r="10" fill="#C5A572" opacity="0.8"/>
      <circle cx="150" cy="-30" r="8" fill="#C5A572" opacity="0.6"/>
      <circle cx="300" cy="10" r="12" fill="#C5A572" opacity="0.9"/>
      <circle cx="450" cy="-20" r="9" fill="#C5A572" opacity="0.7"/>
      
      <path d="M0 0 Q75 -40 150 -30" stroke="#C5A572" stroke-width="2" fill="none" opacity="0.5"/>
      <path d="M150 -30 Q225 20 300 10" stroke="#C5A572" stroke-width="2" fill="none" opacity="0.5"/>
      <path d="M300 10 Q375 -30 450 -20" stroke="#C5A572" stroke-width="2" fill="none" opacity="0.5"/>
    </g>
  </g>
  
  <!-- Knowledge tree -->
  <g transform="translate(1600, 600)" opacity="0.2">
    <!-- Tree trunk -->
    <rect x="45" y="100" width="10" height="80" fill="#C5A572" opacity="0.6"/>
    
    <!-- Branches -->
    <circle cx="30" cy="80" r="15" fill="none" stroke="#C5A572" stroke-width="2" opacity="0.7"/>
    <circle cx="50" cy="60" r="18" fill="none" stroke="#C5A572" stroke-width="2" opacity="0.8"/>
    <circle cx="70" cy="85" r="12" fill="none" stroke="#C5A572" stroke-width="2" opacity="0.6"/>
    
    <!-- Knowledge nodes -->
    <circle cx="30" cy="80" r="3" fill="#C5A572"/>
    <circle cx="50" cy="60" r="4" fill="#C5A572"/>
    <circle cx="70" cy="85" r="2" fill="#C5A572"/>
  </g>
  
  <!-- Geometric learning pattern -->
  <g opacity="0.15">
    <polygon points="800,200 900,150 1000,200 950,300" fill="url(#trainingAccent)"/>
    <polygon points="850,300 950,250 1050,300 1000,400" fill="url(#trainingAccent)"/>
    <polygon points="900,400 1000,350 1100,400 1050,500" fill="url(#trainingAccent)"/>
  </g>
  
  <!-- Professional development grid -->
  <g opacity="0.08">
    <defs>
      <pattern id="devGrid" width="80" height="80" patternUnits="userSpaceOnUse">
        <circle cx="40" cy="40" r="2" fill="#C5A572" opacity="0.3"/>
        <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#C5A572" stroke-width="0.3"/>
      </pattern>
    </defs>
    <rect width="1920" height="1080" fill="url(#devGrid)"/>
  </g>
  
  <!-- Luxury accent lines -->
  <g opacity="0.4">
    <rect x="0" y="250" width="500" height="2" fill="#C5A572"/>
    <rect x="0" y="830" width="700" height="2" fill="#C5A572"/>
    <rect x="1220" y="100" width="700" height="2" fill="#C5A572"/>
  </g>
</svg>